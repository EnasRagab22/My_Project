name: HelloWorkFlow

on: [push]
jobs:
   Hello:
      runs-on: ubuntu-latest
      steps:
         - name: Show message
           run: echo "HelloWorkflow"
         - name: Checkout
           uses: actions/checkout@v4
         - name: ListDir
           run: ls -alh
         - name : change mode
           run : chmod 777 run.sh
         - name: run file
           run : ./run.sh fruits.txt
         - name: SetupPython
           uses: actions/setup-python@v5
           with:
                python-version: "3.10"
         - name: CheckPythonVersion
           run: python --version
         - name: RunPython
           run: python app.py
        
